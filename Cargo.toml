[workspace]
members = [
    "net/core/*",
    "net/ipv4/*"
]

resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"
authors = ["Socrate Agora Pipeline"]
license = "GPL-2.0"

[workspace.dependencies]
libc = "0.2"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
panic = "abort"

[profile.dev]
opt-level = 0
debug = true
