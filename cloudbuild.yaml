steps:
  - name: 'rust:latest'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        # Install QEMU and cross-compilation toolchain
        apt-get update && apt-get install -y qemu-user gcc-aarch64-linux-gnu libc6-dev-arm64-cross
        
        # Add aarch64 target
        rustup target add aarch64-unknown-linux-gnu
        
        # Configure cargo to use QEMU and the cross-linker
        mkdir -p .cargo
        cat <<EOF > .cargo/config.toml
        [target.aarch64-unknown-linux-gnu]
        linker = "aarch64-linux-gnu-gcc"
        runner = "qemu-aarch64 -L /usr/aarch64-linux-gnu"
        EOF
        
        echo "Cross-compiling and executing tests on QEMU..."
        # We test kernel_types and nf_log_syslog which are the ones that successfully compile
        cargo test -p kernel_types --target aarch64-unknown-linux-gnu
        cargo test -p nf_log_syslog --target aarch64-unknown-linux-gnu
